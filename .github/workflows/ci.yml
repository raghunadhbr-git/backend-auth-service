name: CI - Build & Push Docker

on:
  push:
    branches: ["*"]
    tags:
      - "v*"
  create:   # ✅ IMPORTANT (fix missing tag trigger)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # ----------------------------------------
      # METADATA
      # ----------------------------------------
      - name: Set Metadata
        run: |
          echo "BRANCH=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV
          echo "COMMIT=${GITHUB_SHA}" >> $GITHUB_ENV
          echo "SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_ENV

          echo "IMAGE_SHA=pythoncodelife/auth-service:${GITHUB_SHA}" >> $GITHUB_ENV
          echo "IMAGE_LATEST=pythoncodelife/auth-service:latest" >> $GITHUB_ENV

          # Handle tag safely
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          else
            TAG=""
          fi

          echo "TAG=$TAG" >> $GITHUB_ENV

          echo "URL=https://auth-service-production-416b.up.railway.app/" >> $GITHUB_ENV

      # ----------------------------------------
      # DOCKER LOGIN
      # ----------------------------------------
      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN_COMMON }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME_COMMON }}" --password-stdin

      # ----------------------------------------
      # BUILD IMAGE
      # ----------------------------------------
      - name: Build Image
        run: docker build -t $IMAGE_SHA .

      # ----------------------------------------
      # PUSH SHA IMAGE
      # ----------------------------------------
      - name: Push SHA Image
        run: docker push $IMAGE_SHA

      # ----------------------------------------
      # TAG & PUSH LATEST
      # ----------------------------------------
      - name: Push Latest
        run: |
          docker tag $IMAGE_SHA $IMAGE_LATEST
          docker push $IMAGE_LATEST

      # ----------------------------------------
      # TAG & PUSH VERSION (FIXED)
      # ----------------------------------------
      - name: Push Version Tag
        if: env.TAG != ''
        run: |
          echo "📌 Tag detected: $TAG"

          docker tag $IMAGE_SHA pythoncodelife/auth-service:$TAG
          docker push pythoncodelife/auth-service:$TAG

      # ----------------------------------------
      # VERIFY IMAGE
      # ----------------------------------------
      - name: Verify Image
        run: |
          docker manifest inspect $IMAGE_SHA || exit 1

      # ----------------------------------------
      # EMAIL SUCCESS
      # ----------------------------------------
      - name: Email Success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME_DEV }}
          password: ${{ secrets.MAIL_PASSWORD_DEV }}
          subject: "✅ CI SUCCESS"
          to: ${{ secrets.MAIL_TO_DEV }}
          cc: ${{ secrets.MAIL_CC_DEV }}
          body: |
            CI SUCCESS 🚀

            Branch: ${{ env.BRANCH }}
            Commit: ${{ env.COMMIT }}

            Docker Images:
            SHA: ${{ env.IMAGE_SHA }}
            LATEST: ${{ env.IMAGE_LATEST }}
            TAG: ${{ env.TAG }}

            URL:
            ${{ env.URL }}

      # ----------------------------------------
      # EMAIL FAILURE
      # ----------------------------------------
      - name: Email Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
