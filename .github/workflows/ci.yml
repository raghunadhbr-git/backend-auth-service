name: CI - Build, Test & Push Docker (backend-auth-service)

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          echo "Installing dependencies..."
          pip install -r requirements.txt
          pip install pytest

      - name: Run Tests
        run: |
          echo "Running tests..."
          pytest

      - name: Detect Branch / Tag
        run: |
          echo "REF: $GITHUB_REF"
          echo "COMMIT: $GITHUB_SHA"

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            echo "TAG=$TAG" >> $GITHUB_ENV
            echo "TYPE=tag" >> $GITHUB_ENV
            echo "Tag build: $TAG"
          else
            BRANCH=${GITHUB_REF#refs/heads/}
            echo "BRANCH=$BRANCH" >> $GITHUB_ENV
            echo "TYPE=branch" >> $GITHUB_ENV
            echo "Branch build: $BRANCH"
          fi

      - name: Set Image
        run: |
          echo "IMAGE=pythoncodelife/backend-auth-service:${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
          -u "${{ secrets.DOCKERHUB_USERNAME }}" \
          --password-stdin

      - name: Build Image
        run: |
          echo "Building image..."
          docker build -t $IMAGE .

      - name: Push SHA Image
        run: |
          echo "Pushing SHA image..."
          docker push $IMAGE

      - name: Tag Latest
        run: |
          echo "Updating latest..."
          docker tag $IMAGE pythoncodelife/backend-auth-service:latest
          docker push pythoncodelife/backend-auth-service:latest

      - name: Tag Version
        if: env.TYPE == 'tag'
        run: |
          echo "Pushing tag: $TAG"
          docker tag $IMAGE pythoncodelife/backend-auth-service:$TAG
          docker push pythoncodelife/backend-auth-service:$TAG

      - name: Summary
        run: |
          echo "CI DONE"
          echo "Type: $TYPE"
          echo "Branch: $BRANCH"
          echo "Tag: $TAG"
          echo "Image: $IMAGE"
