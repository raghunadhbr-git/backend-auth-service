name: CI - Build, Test & Push Docker (backend-auth-service)

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run Tests
        run: pytest

      - name: Detect Context
        run: |
          echo "REF=${GITHUB_REF}" >> $GITHUB_ENV
          echo "COMMIT=${GITHUB_SHA}" >> $GITHUB_ENV
          echo "IMAGE=pythoncodelife/backend-auth-service:${GITHUB_SHA}" >> $GITHUB_ENV

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "IS_TAG=true" >> $GITHUB_ENV
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          else
            echo "IS_TAG=false" >> $GITHUB_ENV
            echo "BRANCH=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV
          fi

      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
          -u "${{ secrets.DOCKERHUB_USERNAME }}" \
          --password-stdin

      - name: Build Image
        run: docker build -t $IMAGE .

      - name: Push SHA Image
        run: docker push $IMAGE

      - name: Tag Latest
        if: env.IS_TAG == 'false'
        run: |
          docker tag $IMAGE pythoncodelife/backend-auth-service:latest
          docker push pythoncodelife/backend-auth-service:latest

      - name: Tag Version
        if: env.IS_TAG == 'true'
        run: |
          docker tag $IMAGE pythoncodelife/backend-auth-service:$TAG
          docker push pythoncodelife/backend-auth-service:$TAG

      # ✅ EMAIL SUCCESS
      - name: Email Success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME_MAIN }}
          password: ${{ secrets.MAIL_PASSWORD_MAIN }}
          subject: "CI SUCCESS - backend-auth-service"
          to: ${{ secrets.MAIL_TO_CC_MAIN }}
          from: ${{ secrets.MAIL_USERNAME_MAIN }}
          body: |
            CI SUCCESS

            Ref: ${{ env.REF }}
            Commit: ${{ env.COMMIT }}
            Branch: ${{ env.BRANCH }}
            Tag: ${{ env.TAG }}

      # ❌ EMAIL FAILURE
      - name: Email Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME_MAIN }}
          password: ${{ secrets.MAIL_PASSWORD_MAIN }}
          subject: "CI FAILED - backend-auth-service"
          to: ${{ secrets.MAIL_TO_CC_MAIN }}
          from: ${{ secrets.MAIL_USERNAME_MAIN }}
          body: |
            CI FAILED

            Ref: ${{ env.REF }}
            Commit: ${{ env.COMMIT }}
