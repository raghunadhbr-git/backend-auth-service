name: 🚀 CI - Build & Push (backend-auth-service)

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # ===============================
      # 🟢 Checkout
      # ===============================
      - name: Checkout
        uses: actions/checkout@v3

      # ===============================
      # 🟢 Set Version Info
      # ===============================
      - name: Set Version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            TYPE="TAG"
            NAME=$VERSION
          else
            VERSION=dev-${GITHUB_SHA}
            TYPE="BRANCH"
            NAME=${GITHUB_REF#refs/heads/}
          fi

          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "APP_COMMIT=${GITHUB_SHA}" >> $GITHUB_ENV
          echo "IMAGE=pythoncodelife/backend-auth-service:${GITHUB_SHA}" >> $GITHUB_ENV
          echo "TYPE=$TYPE" >> $GITHUB_ENV
          echo "NAME=$NAME" >> $GITHUB_ENV

          echo "REPO=https://github.com/raghunadhbr-git/backend-auth-service" >> $GITHUB_ENV
          echo "DOCKER=https://hub.docker.com/r/pythoncodelife/backend-auth-service" >> $GITHUB_ENV

      # ===============================
      # 🟢 Docker Login
      # ===============================
      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
          -u "${{ secrets.DOCKERHUB_USERNAME }}" \
          --password-stdin

      # ===============================
      # 🔥 Build Image
      # ===============================
      - name: Build Image
        run: |
          docker build \
          --build-arg APP_VERSION=${APP_VERSION} \
          --build-arg APP_COMMIT=${APP_COMMIT} \
          -t $IMAGE .

      # ===============================
      # 🟢 Push Image
      # ===============================
      - name: Push Image
        run: docker push $IMAGE

      # ===============================
      # 🟢 Tag Latest
      # ===============================
      - name: Tag Latest
        run: |
          docker tag $IMAGE pythoncodelife/backend-auth-service:latest
          docker push pythoncodelife/backend-auth-service:latest

      # ===============================
      # 📧 Email Success
      # ===============================
      - name: 📧 Email Success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME_MAIN }}
          password: ${{ secrets.MAIL_PASSWORD_MAIN }}
          subject: "🚀 CI SUCCESS - ${{ env.NAME }}"
          to: ${{ secrets.MAIL_USERNAME_MAIN }}
          cc: ${{ secrets.MAIL_TO_CC_MAIN }}
          from: ${{ secrets.MAIL_USERNAME_MAIN }}
          body: |
            🚀 CI BUILD SUCCESS

            📌 Type: ${{ env.TYPE }}
            🏷️ Name: ${{ env.NAME }}

            🔑 Commit SHA:
            ${{ env.APP_COMMIT }}

            🐳 Docker Image:
            ${{ env.IMAGE }}

            🔗 GitHub Repo:
            ${{ env.REPO }}

            🐳 Docker Hub:
            ${{ env.DOCKER }}

            👉 Build & Push completed successfully

      # ===============================
      # ❌ Email Failure
      # ===============================
      - name: ❌ Email Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME_MAIN }}
          password: ${{ secrets.MAIL_PASSWORD_MAIN }}
          subject: "🚨 CI FAILED - ${{ env.NAME }}"
          to: ${{ secrets.MAIL_USERNAME_MAIN }}
          cc: ${{ secrets.MAIL_TO_CC_MAIN }}
          from: ${{ secrets.MAIL_USERNAME_MAIN }}
          body: |
            🚨 CI BUILD FAILED

            📌 Type: ${{ env.TYPE }}
            🏷️ Name: ${{ env.NAME }}

            🔑 Commit SHA:
            ${{ env.APP_COMMIT }}

            🔗 Repo:
            ${{ env.REPO }}

            🔧 Check GitHub Actions logs