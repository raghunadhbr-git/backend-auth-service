name: CI - Build, Test & Push Docker (backend-auth-service)

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"

  create:
    tags:
      - "v*"

  pull_request:

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 📦 Install Dependencies
        run: |
          echo "📦 Installing dependencies..."
          pip install -r requirements.txt
          pip install pytest

      - name: 🧪 Run Tests
        run: |
          echo "🧪 Running tests..."
          pytest

      - name: 🧠 Detect Branch / Tag
        run: |
          echo "🔍 Detecting context..."
          echo "REF: $GITHUB_REF"
          echo "COMMIT: $GITHUB_SHA"

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            echo "🏷️ TAG BUILD: $TAG"
            echo "TAG=$TAG" >> $GITHUB_ENV
            echo "TYPE=tag" >> $GITHUB_ENV
          else
            BRANCH=${GITHUB_REF#refs/heads/}
            echo "🌿 BRANCH BUILD: $BRANCH"
            echo "BRANCH=$BRANCH" >> $GITHUB_ENV
            echo "TYPE=branch" >> $GITHUB_ENV
          fi

      - name: 🧠 Set Image
        run: |
          echo "IMAGE=pythoncodelife/backend-auth-service:${GITHUB_SHA}" >> $GITHUB_ENV
          echo "📦 Image: pythoncodelife/backend-auth-service:${GITHUB_SHA}"

      - name: 🔐 Docker Login
        run: |
          echo "🔐 Logging into DockerHub..."
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
          -u "${{ secrets.DOCKERHUB_USERNAME }}" \
          --password-stdin

      - name: 🐳 Build Image
        run: |
          echo "🐳 Building Docker image..."
          docker build -t $IMAGE .

      - name: 📤 Push SHA Image
        run: |
          echo "📤 Pushing SHA image..."
          docker push $IMAGE

      - name: 🔁 Tag Latest
        run: |
          echo "🔁 Tagging latest..."
          docker tag $IMAGE pythoncodelife/backend-auth-service:latest
          docker push pythoncodelife/backend-auth-service:latest
          echo "✅ Latest updated"

      - name: 🏷️ Tag Version
        if: env.TYPE == 'tag'
        run: |
          echo "🏷️ Tagging version..."
          docker tag $IMAGE pythoncodelife/backend-auth-service:$TAG
          docker push pythoncodelife/backend-auth-service:$TAG
          echo "✅ Version tag pushed: $TAG"

      - name: 📊 Summary
        run: |
          echo "================================="
          echo "🚀 CI COMPLETED"
          echo "Type: $TYPE"
          echo "Branch: $BRANCH"
          echo "Tag: $TAG"
          echo "Image: $IMAGE"
          echo "================================="
