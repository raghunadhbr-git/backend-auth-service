name: CI - Build, Test & Push Docker (backend-auth-service)

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # 🟢 Checkout
      - name: Checkout
        uses: actions/checkout@v3

      # 🟢 Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # 🟢 Install deps
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      # 🟢 Tests
      - name: Run Tests
        run: pytest

      # 🟢 Detect context
      - name: Detect Context
        run: |
          echo "REF=${GITHUB_REF}" >> $GITHUB_ENV
          echo "COMMIT=${GITHUB_SHA}" >> $GITHUB_ENV
          echo "IMAGE=pythoncodelife/backend-auth-service:${GITHUB_SHA}" >> $GITHUB_ENV

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=dev-${GITHUB_SHA}
          fi

          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "APP_COMMIT=${GITHUB_SHA}" >> $GITHUB_ENV

      # 🟢 Docker login
      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
          -u "${{ secrets.DOCKERHUB_USERNAME }}" \
          --password-stdin

      # 🟢 Build image (IMPORTANT)
      - name: Build Image
        run: |
          docker build \
          --build-arg APP_VERSION=${APP_VERSION} \
          --build-arg APP_COMMIT=${APP_COMMIT} \
          -t $IMAGE .

      # 🟢 Push SHA
      - name: Push SHA Image
        run: docker push $IMAGE

      # 🟢 Tag latest
      - name: Tag Latest
        run: |
          docker tag $IMAGE pythoncodelife/backend-auth-service:latest
          docker push pythoncodelife/backend-auth-service:latest

      # 🟢 Tag version
      - name: Tag Version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          docker tag $IMAGE pythoncodelife/backend-auth-service:${APP_VERSION}
          docker push pythoncodelife/backend-auth-service:${APP_VERSION}

      # 🟢 Email success
      - name: Email Success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME_MAIN }}
          password: ${{ secrets.MAIL_PASSWORD_MAIN }}
          subject: "CI SUCCESS - backend-auth-service"
          to: ${{ secrets.MAIL_TO_CC_MAIN }}
          from: ${{ secrets.MAIL_USERNAME_MAIN }}

      # 🔴 Email failure
      - name: Email Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME_MAIN }}
          password: ${{ secrets.MAIL_PASSWORD_MAIN }}
          subject: "CI FAILED - backend-auth-service"
          to: ${{ secrets.MAIL_TO_CC_MAIN }}
          from: ${{ secrets.MAIL_USERNAME_MAIN }}