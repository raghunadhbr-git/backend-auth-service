name: CI - Build, Test & Push Docker (backend-auth-service)  

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"

  create:
    tags:
      - "v*"

  pull_request:

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run Tests
        run: |
          pytest

      - name: Set Metadata
        run: |
          echo "IMAGE=pythoncodelife/backend-auth-service:${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Docker Login
        run: |
          USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
          TOKEN=${{ secrets.DOCKERHUB_TOKEN }}
          echo "$TOKEN" | docker login -u "$USERNAME" --password-stdin

      - name: Build Image
        run: docker build -t $IMAGE .

      - name: Push SHA Image
        run: docker push $IMAGE

      - name: Tag Latest
        run: |
          docker tag $IMAGE pythoncodelife/backend-auth-service:latest
          docker push pythoncodelife/backend-auth-service:latest

      - name: Tag Version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          docker tag $IMAGE pythoncodelife/backend-auth-service:$TAG
          docker push pythoncodelife/backend-auth-service:$TAG
