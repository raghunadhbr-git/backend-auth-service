# ============================================
# WORKFLOW NAME
# ============================================
name: CI - Build & Push Docker

# ============================================
# TRIGGERS
# ============================================
on:
  # ✅ Runs on any branch push + tag push
  push:
    branches:
      - "**"
    tags:
      - "v*"

  # ✅ Runs when tag is created
  create:
    tags:
      - "v*"

  # ✅ Pull request trigger
  pull_request:

  # ✅ Manual trigger
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment (dev/staging/prod)"
        required: false
        default: "dev"

# ============================================
# JOBS
# ============================================
jobs:
  build:
    # ✅ Shows branch/tag in GitHub UI
    name: CI Build - ${{ github.ref_name }}

    runs-on: ubuntu-latest

    steps:
      # ============================================
      # STEP 1: Checkout
      # ============================================
      - name: Checkout Code
        uses: actions/checkout@v3

      # ============================================
      # STEP 2: Metadata Setup
      # ============================================
      - name: Set Metadata
        run: |
          echo "REF=${GITHUB_REF}" >> $GITHUB_ENV
          echo "COMMIT=${GITHUB_SHA}" >> $GITHUB_ENV
          echo "IMAGE=pythoncodelife/auth-service:${GITHUB_SHA}" >> $GITHUB_ENV
          echo "URL=https://auth-service-production-416b.up.railway.app/" >> $GITHUB_ENV

          # Detect TAG vs BRANCH
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "IS_TAG=true" >> $GITHUB_ENV
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          else
            echo "IS_TAG=false" >> $GITHUB_ENV
            echo "BRANCH=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV
          fi

      # ============================================
      # STEP 3: Debug / Visibility Logs
      # ============================================
      - name: Show Execution Info
        run: |
          echo "========================================="
          echo "🚀 CI PIPELINE TRIGGERED"
          echo "-----------------------------------------"
          echo "Ref: $REF"
          echo "Commit: $COMMIT"

          if [ "$IS_TAG" = "true" ]; then
            echo "Type: TAG BUILD"
            echo "Tag: $TAG"
          else
            echo "Type: BRANCH BUILD"
            echo "Branch: $BRANCH"
          fi

          echo "Docker Image: $IMAGE"
          echo "========================================="

      # ============================================
      # STEP 4: Docker Login
      # ============================================
      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN_COMMON }}" | docker login \
          -u "${{ secrets.DOCKERHUB_USERNAME_COMMON }}" \
          --password-stdin

      # ============================================
      # STEP 5: Build Docker Image
      # ============================================
      - name: Build Image
        run: docker build -t $IMAGE .

      # ============================================
      # STEP 6: Push SHA Image (Always)
      # ============================================
      - name: Push SHA Image
        run: docker push $IMAGE

      # ============================================
      # STEP 7: Tag as latest (ONLY for branch builds)
      # ============================================
      - name: Tag Latest
        if: env.IS_TAG == 'false'
        run: |
          docker tag $IMAGE pythoncodelife/auth-service:latest
          docker push pythoncodelife/auth-service:latest

      # ============================================
      # STEP 8: Tag with version (ONLY for tag builds)
      # ============================================
      - name: Tag Version
        if: env.IS_TAG == 'true'
        run: |
          docker tag $IMAGE pythoncodelife/auth-service:${TAG}
          docker push pythoncodelife/auth-service:${TAG}

      # ============================================
      # STEP 9: Email Success
      # ============================================
      - name: Email Success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME_DEV }}
          password: ${{ secrets.MAIL_PASSWORD_DEV }}
          subject: "✅ CI SUCCESS 🚀"
          to: ${{ secrets.MAIL_TO_DEV }}
          cc: ${{ secrets.MAIL_CC_DEV }}
          from: ${{ secrets.MAIL_USERNAME_DEV }}
          body: |
            CI SUCCESS 🚀

            Ref: ${{ env.REF }}
            Commit: ${{ env.COMMIT }}

            Docker Image:
            ${{ env.IMAGE }}

            URL:
            ${{ env.URL }}

      # ============================================
      # STEP 10: Email Failure
      # ============================================
      - name: Email Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
