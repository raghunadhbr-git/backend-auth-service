name: Release Tags

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # ✅ FULL history (important)
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Fetch Tags
        run: git fetch --tags

      # ----------------------------------------
      # STEP 1: Get Latest Tag
      # ----------------------------------------
      - name: Get Latest Tag
        run: |
          LATEST=$(git tag --sort=-v:refname | head -n 1)

          if [ -z "$LATEST" ]; then
            LATEST="v1.0.0"
          fi

          echo "LATEST_TAG=$LATEST" >> $GITHUB_ENV
          echo "📌 Latest tag: $LATEST"

      # ----------------------------------------
      # STEP 2: Show Changes
      # ----------------------------------------
      - name: Show Changes
        run: |
          echo "--------------------------------"
          echo "📜 Changes since last release:"
          git log $LATEST_TAG..HEAD --oneline || echo "No changes"
          echo "--------------------------------"

      # ----------------------------------------
      # STEP 3: Increment Version
      # ----------------------------------------
      - name: Increment Tag
        run: |
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          PATCH=$((PATCH+1))

          NEW_TAG="v$MAJOR.$MINOR.$PATCH"

          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV
          echo "💡 New tag: $NEW_TAG"

      # ----------------------------------------
      # STEP 4: Create Tag (SAFE)
      # ----------------------------------------
      - name: Create Tag
        run: |
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "⚠️ Tag already exists → skipping"
            exit 0
          fi

          git tag $NEW_TAG
          git push origin $NEW_TAG

          echo "✅ Tag created: $NEW_TAG"

      # ----------------------------------------
      # STEP 5: Create Release
      # ----------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.NEW_TAG }}
          name: "🚀 Release ${{ env.NEW_TAG }}"
          body: |
            🔥 Auto Release

            Latest Tag:
            ${{ env.LATEST_TAG }}

            New Tag:
            ${{ env.NEW_TAG }}

            --------------------------------
            Changes:
            See workflow logs

      # ----------------------------------------
      # DONE
      # ----------------------------------------
      - name: Done
        run: echo "🎯 RELEASE COMPLETED SUCCESSFULLY 🚀"
