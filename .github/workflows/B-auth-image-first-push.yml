name: 🚀 Build & Push Auth Service Image (Manual)

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

      # Checkout
      - name: 📥 Checkout Repository
        uses: actions/checkout@v3

      # Docker Login
      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build Image
      - name: 🐳 Build Docker Image
        run: |
          docker build -t pythoncodelife/auth-service:latest .

      # Push Image
      - name: 📤 Push Docker Image
        run: |
          docker push pythoncodelife/auth-service:latest

      # Done
      - name: ✅ Done
        run: echo "Auth image pushed successfully"
