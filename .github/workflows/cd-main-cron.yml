name: CD - Render Deploy (Latest)

on:
  workflow_dispatch:
  schedule:
    - cron: "30 20 * * *"   # 2 AM IST

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # ==============================
      # Checkout Code
      # ==============================
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # ==============================
      # Fetch Tags
      # ==============================
      - name: Fetch Tags
        run: |
          echo "Fetching tags..."
          git fetch --tags

      # ==============================
      # Detect Latest Tag
      # ==============================
      - name: Detect Latest Tag
        run: |
          TAGS=($(git tag --sort=-v:refname))
          LATEST=${TAGS[0]}
          echo "LATEST=$LATEST" >> $GITHUB_ENV
          echo "Latest tag: $LATEST"

      # ==============================
      # Deploy to Render
      # ==============================
      - name: Deploy to Render
        run: |
          echo "Triggering Render deploy..."
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      # ==============================
      # Wait for Deployment
      # ==============================
      - name: Wait
        run: |
          echo "Waiting for deployment..."
          sleep 40

      # ==============================
      # Health Check
      # ==============================
      - name: Health Check
        run: |
          URL="https://backend-auth-service-ks6f.onrender.com/"
          RESPONSE=$(curl -s $URL)

          echo "URL: $URL"
          echo "Response: $RESPONSE"

          if [[ "$RESPONSE" == *"Auth service started successfully"* ]]; then
            echo "Deployment success"
          else
            echo "Deployment failed"
            exit 1
          fi

      # ==============================
      # Summary
      # ==============================
      - name: Summary
        run: |
          echo "=============================="
          echo "CD DONE"
          echo "Latest Tag: $LATEST"
          echo "Deployed: latest image"
          echo "=============================="
