name: 🚀 CD - Cron Latest Tag 

on:
  workflow_dispatch:
  schedule:
    - cron: "30 20 * * *"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Fetch Tags
        run: git fetch --tags

      - name: Get Tags
        run: |
          TAGS=($(git tag --sort=-v:refname))
          
          LATEST=${TAGS[0]}
          PREVIOUS=${TAGS[1]}

          echo "TAG=$LATEST" >> $GITHUB_ENV
          echo "PREV_TAG=$PREVIOUS" >> $GITHUB_ENV

          echo "IMAGE=pythoncodelife/auth-service:$LATEST" >> $GITHUB_ENV
          echo "PREV_IMAGE=pythoncodelife/auth-service:$PREVIOUS" >> $GITHUB_ENV

          echo "URL=https://auth-service-production-416b.up.railway.app/" >> $GITHUB_ENV

          COMMIT=$(git rev-list -n 1 $LATEST)
          echo "COMMIT=$COMMIT" >> $GITHUB_ENV

      - name: Pull Latest Image
        run: docker pull $IMAGE

      # 🔥 SAFE FIX (removed envVars only)
      - name: Deploy Latest
        run: |
          curl -X POST "https://backboard.railway.app/project/${{ secrets.RAILWAY_ENVIRONMENT_ID_STAGING }}/service/${{ secrets.RAILWAY_SERVICE_ID_STAGING }}/deploy" \
          -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN_STAGING }}"

      - name: Wait
        run: sleep 30

      - name: Health Check Latest
        id: health_latest
        run: |
          RESPONSE=$(curl -s $URL)
          echo "RESPONSE=$RESPONSE" >> $GITHUB_ENV

          if [[ "$RESPONSE" == *"Auth service started successfully"* ]]; then
            echo "STATUS=success" >> $GITHUB_ENV
            exit 0
          else
            echo "STATUS=fail" >> $GITHUB_ENV
            exit 1
          fi

      # 🔁 FALLBACK (UNCHANGED)
      - name: Pull Previous Image
        if: failure()
        run: docker pull $PREV_IMAGE

      - name: Deploy Previous
        if: failure()
        run: |
          curl -X POST "https://backboard.railway.app/project/${{ secrets.RAILWAY_ENVIRONMENT_ID_STAGING }}/service/${{ secrets.RAILWAY_SERVICE_ID_STAGING }}/deploy" \
          -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN_STAGING }}"