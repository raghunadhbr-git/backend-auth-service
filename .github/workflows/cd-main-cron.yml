name: CD - Render Deploy (Latest + Rollback)

on:
  workflow_dispatch:
  schedule:
    - cron: "30 20 * * *"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Fetch Tags
        run: git fetch --tags

      - name: Detect Tags
        run: |
          TAGS=($(git tag --sort=-v:refname))

          LATEST=${TAGS[0]}
          PREVIOUS=${TAGS[1]}

          echo "TAG=$LATEST" >> $GITHUB_ENV
          echo "PREV_TAG=$PREVIOUS" >> $GITHUB_ENV

          echo "URL=https://backend-auth-service-ks6f.onrender.com/" >> $GITHUB_ENV
          echo "REPO=https://github.com/raghunadhbr-git/backend-auth-service" >> $GITHUB_ENV
          echo "DOCKER=https://hub.docker.com/r/pythoncodelife/backend-auth-service" >> $GITHUB_ENV

          COMMIT=$(git rev-list -n 1 $LATEST)
          echo "COMMIT=$COMMIT" >> $GITHUB_ENV

      - name: Deploy Latest
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      - name: Wait
        run: sleep 40

      - name: Health Check Latest
        run: |
          RESPONSE=$(curl -s $URL)

          if [[ "$RESPONSE" == *"Auth service started successfully"* ]]; then
            echo "STATUS=success" >> $GITHUB_ENV
          else
            echo "STATUS=fail" >> $GITHUB_ENV
            exit 1
          fi

      - name: Rollback Deploy
        if: failure()
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      - name: Wait Rollback
        if: failure()
        run: sleep 40

      - name: Health Check Rollback
        if: failure()
        run: |
          RESPONSE=$(curl -s $URL)

          if [[ "$RESPONSE" == *"Auth service started successfully"* ]]; then
            echo "FALLBACK_STATUS=success" >> $GITHUB_ENV
          else
            echo "FALLBACK_STATUS=fail" >> $GITHUB_ENV
            exit 1
          fi

      # ✅ EMAIL SUCCESS (ENHANCED)
      - name: Email Success
        if: success() && env.STATUS == 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME_MAIN }}
          password: ${{ secrets.MAIL_PASSWORD_MAIN }}
          subject: "🚀 CD SUCCESS - ${{ env.TAG }}"
          to: ${{ secrets.MAIL_TO_CC_MAIN }}
          from: ${{ secrets.MAIL_USERNAME_MAIN }}
          body: |
            🚀 DEPLOYMENT SUCCESS

            🏷️ Tag: ${{ env.TAG }}
            🔑 Commit SHA: ${{ env.COMMIT }}

            🔗 GitHub Repo:
            ${{ env.REPO }}

            🐳 Docker Image:
            ${{ env.DOCKER }}

            🌐 Health Check URL:
            ${{ env.URL }}

            👉 Click the URL above to verify service is running

      # ⚠️ ROLLBACK SUCCESS
      - name: Email Rollback
        if: env.FALLBACK_STATUS == 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME_MAIN }}
          password: ${{ secrets.MAIL_PASSWORD_MAIN }}
          subject: "⚠️ ROLLBACK SUCCESS - ${{ env.PREV_TAG }}"
          to: ${{ secrets.MAIL_TO_CC_MAIN }}
          from: ${{ secrets.MAIL_USERNAME_MAIN }}
          body: |
            ⚠️ ROLLBACK SUCCESS

            ❌ Failed Tag: ${{ env.TAG }}
            🔁 Rolled back to: ${{ env.PREV_TAG }}

            🌐 Service URL:
            ${{ env.URL }}

      # ❌ FINAL FAILURE
      - name: Email Failure
        if: failure() && env.FALLBACK_STATUS == 'fail'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME_MAIN }}
          password: ${{ secrets.MAIL_PASSWORD_MAIN }}
          subject: "🚨 CD FAILED - ACTION REQUIRED"
          to: ${{ secrets.MAIL_TO_CC_MAIN }}
          from: ${{ secrets.MAIL_USERNAME_MAIN }}
          body: |
            🚨 DEPLOYMENT FAILED

            ❌ Latest Tag Failed: ${{ env.TAG }}
            ❌ Previous Tag Failed: ${{ env.PREV_TAG }}

            🔧 Manual intervention required

            🌐 URL:
            ${{ env.URL }}
