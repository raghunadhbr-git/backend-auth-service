name: CD - Render Deploy (Latest)

on:
  workflow_dispatch:
  schedule:
    - cron: "30 20 * * *"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Fetch Tags
        run: |
          git fetch --tags

      - name: Detect Latest Tag
        run: |
          TAGS=($(git tag --sort=-v:refname))
          LATEST=${TAGS[0]}
          echo "LATEST=$LATEST" >> $GITHUB_ENV

      - name: Deploy to Render
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      - name: Wait
        run: sleep 40

      - name: Health Check
        run: |
          URL="https://backend-auth-service-ks6f.onrender.com/"
          RESPONSE=$(curl -s $URL)

          echo "Response: $RESPONSE"

          if [[ "$RESPONSE" == *"Auth service started successfully"* ]]; then
            echo "STATUS=success" >> $GITHUB_ENV
          else
            echo "STATUS=fail" >> $GITHUB_ENV
            exit 1
          fi

      - name: Summary
        run: |
          echo "CD DONE"
          echo "Latest Tag: $LATEST"
          echo "Status: $STATUS"

      # 📧 Email (always CC only)
      - name: Email CD Status
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME_MAIN }}
          password: ${{ secrets.MAIL_PASSWORD_DEV }}
          subject: "CD STATUS - backend-auth-service"
          to: ${{ secrets.MAIL_CC_STAGING }}
          from: ${{ secrets.MAIL_USERNAME_MAIN }}
          body: |
            CD Completed

            Latest Tag: $LATEST
            Status: $STATUS
            URL: https://backend-auth-service-ks6f.onrender.com/
