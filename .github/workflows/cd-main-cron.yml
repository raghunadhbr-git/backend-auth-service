name: 🚀 CD - Render Deploy (Latest Tag)

on:
  workflow_dispatch:
  schedule:
    - cron: "30 20 * * *"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # =========================
      # 🟢 Checkout Repo
      # =========================
      - name: 🟢 Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # =========================
      # 🟢 Fetch Tags
      # =========================
      - name: 🟢 Fetch Tags
        run: git fetch --tags

      # =========================
      # 🟢 Detect Latest Tag
      # =========================
      - name: 🟢 Detect Latest Tag
        run: |
          TAGS=($(git tag --sort=-v:refname))
          LATEST=${TAGS[0]}
          PREVIOUS=${TAGS[1]}

          echo "TAG=$LATEST" >> $GITHUB_ENV
          echo "PREV_TAG=$PREVIOUS" >> $GITHUB_ENV

          echo "URL=https://backend-auth-service-ks6f.onrender.com/" >> $GITHUB_ENV
          echo "REPO=https://github.com/raghunadhbr-git/backend-auth-service" >> $GITHUB_ENV
          echo "DOCKER=https://hub.docker.com/r/pythoncodelife/backend-auth-service" >> $GITHUB_ENV

          COMMIT=$(git rev-list -n 1 $LATEST)
          echo "COMMIT=$COMMIT" >> $GITHUB_ENV

          echo "🚀 Latest Tag: $LATEST"
          echo "📦 Commit: $COMMIT"

      # =========================
      # 🟢 Deploy Latest
      # =========================
      - name: 🟢 Deploy Latest
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      - name: 🟢 Wait
        run: sleep 40

      # =========================
      # 🟢 Health Check (FIXED)
      # =========================
      - name: 🟢 Health Check Latest
        run: |
          RESPONSE=$(curl -s $URL)
          echo "Response: $RESPONSE"

          if [[ "$RESPONSE" == *"Auth service running"* ]]; then
            echo "STATUS=success" >> $GITHUB_ENV
          else
            echo "STATUS=fail" >> $GITHUB_ENV
            exit 1
          fi

      # =========================
      # 🔁 Rollback (if fail)
      # =========================
      - name: 🔁 Rollback Deploy
        if: failure()
        run: |
          echo "⚠️ Deploy failed, trying previous tag..."
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      - name: 🔁 Wait Rollback
        if: failure()
        run: sleep 40

      - name: 🔁 Health Check Rollback
        if: failure()
        run: |
          RESPONSE=$(curl -s $URL)
          echo "Rollback Response: $RESPONSE"

          if [[ "$RESPONSE" == *"Auth service running"* ]]; then
            echo "FALLBACK_STATUS=success" >> $GITHUB_ENV
          else
            echo "FALLBACK_STATUS=fail" >> $GITHUB_ENV
            exit 1
          fi

      # =========================
      # 📧 SUCCESS EMAIL
      # =========================
      - name: 📧 Email Success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME_MAIN }}
          password: ${{ secrets.MAIL_PASSWORD_MAIN }}
          subject: "🚀 CD SUCCESS - ${{ env.TAG }}"
          to: ${{ secrets.MAIL_USERNAME_MAIN }}
          cc: ${{ secrets.MAIL_TO_CC_MAIN }}
          from: ${{ secrets.MAIL_USERNAME_MAIN }}
          body: |
            🚀 DEPLOYMENT SUCCESS

            🏷️ Tag: ${{ env.TAG }}
            🔑 Commit SHA: ${{ env.COMMIT }}

            🔗 GitHub Repo:
            ${{ env.REPO }}

            🐳 Docker Image:
            ${{ env.DOCKER }}

            🌐 Health Check URL:
            ${{ env.URL }}

            👉 Click the URL to verify service

      # =========================
      # ❌ FAILURE EMAIL
      # =========================
      - name: ❌ Email Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME_MAIN }}
          password: ${{ secrets.MAIL_PASSWORD_MAIN }}
          subject: "🚨 CD FAILED - ACTION REQUIRED"
          to: ${{ secrets.MAIL_USERNAME_MAIN }}
          cc: ${{ secrets.MAIL_TO_CC_MAIN }}
          from: ${{ secrets.MAIL_USERNAME_MAIN }}
          body: |
            🚨 DEPLOYMENT FAILED

            ❌ Latest Tag Failed: ${{ env.TAG }}
            ❌ Previous Tag Failed: ${{ env.PREV_TAG }}

            🔑 Commit SHA: ${{ env.COMMIT }}

            🔗 GitHub Repo:
            ${{ env.REPO }}

            🐳 Docker Image:
            ${{ env.DOCKER }}

            🌐 Health Check URL:
            ${{ env.URL }}

            🔧 Manual intervention required
