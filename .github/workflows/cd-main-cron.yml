name: CD - Render Deploy (Latest Image)

on:
  workflow_dispatch:
  schedule:
    - cron: "30 20 * * *"   # 2 AM IST

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # ==============================
      # 📥 Checkout (optional)
      # ==============================
      - name: Checkout
        uses: actions/checkout@v3

      # ==============================
      # 🧠 Info Logs
      # ==============================
      - name: Show Info
        run: |
          echo "🚀 CD STARTED"
          echo "⏰ Time: $(date)"
          echo "📦 Deploying latest image from DockerHub"

      # ==============================
      # 🚀 Deploy to Render
      # ==============================
      - name: Trigger Render Deploy
        run: |
          echo "🚀 Triggering Render Deployment..."
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
          echo "✅ Deploy triggered"

      # ==============================
      # ⏳ Wait
      # ==============================
      - name: Wait
        run: sleep 40

      # ==============================
      # 🔍 Health Check
      # ==============================
      - name: Health Check
        run: |
          URL="https://backend-auth-service.onrender.com"
          RESPONSE=$(curl -s $URL)

          echo "Response: $RESPONSE"

          if [[ "$RESPONSE" == *"Auth service started successfully"* ]]; then
            echo "✅ Deployment Successful"
          else
            echo "❌ Deployment Failed"
            exit 1
          fi

      # ==============================
      # 🎉 Done
      # ==============================
      - name: Done
        run: echo "🚀 CD Completed Successfully"
