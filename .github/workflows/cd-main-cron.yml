name: CD - Render Deploy (Latest)

on:
  workflow_dispatch:
  schedule:
    - cron: "30 20 * * *"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Fetch Tags
        run: |
          echo "Fetching tags..."
          git fetch --tags

      - name: Detect Latest Tag
        run: |
          TAGS=($(git tag --sort=-v:refname))
          LATEST=${TAGS[0]}
          echo "LATEST=$LATEST" >> $GITHUB_ENV
          echo "Latest tag: $LATEST"

      - name: Deploy to Render
        run: |
          echo "Triggering Render deploy..."
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      - name: Wait
        run: |
          echo "Waiting for deployment..."
          sleep 40

      - name: Health Check
        run: |
          URL="https://backend-auth-service.onrender.com"
          RESPONSE=$(curl -s $URL)

          echo "Response: $RESPONSE"

          if [[ "$RESPONSE" == *"Auth service started successfully"* ]]; then
            echo "Deployment success"
          else
            echo "Deployment failed"
            exit 1
          fi

      - name: Summary
        run: |
          echo "CD DONE"
          echo "Latest Tag: $LATEST"
          echo "Deployed: latest image"
