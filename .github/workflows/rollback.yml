name: 🔁 Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Enter tag to rollback (e.g., v1.0.20)"
        required: true

jobs:
  rollback:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------
      # Checkout repo
      # ----------------------------------------
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # ----------------------------------------
      # Fetch tags
      # ----------------------------------------
      - name: Fetch Tags
        run: git fetch --tags

      # ----------------------------------------
      # Show Last 10 Tags (for logs visibility)
      # ----------------------------------------
      - name: Show Recent Tags
        run: |
          echo "📌 Last 10 Tags:"
          git tag --sort=-v:refname | head -n 10

      # ----------------------------------------
      # Set Selected Tag + Commit
      # ----------------------------------------
      - name: Set Metadata
        run: |
          TAG=${{ github.event.inputs.tag }}

          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "IMAGE=pythoncodelife/auth-service:$TAG" >> $GITHUB_ENV
          echo "URL=https://auth-service-production-416b.up.railway.app/" >> $GITHUB_ENV

          COMMIT=$(git rev-list -n 1 $TAG)
          echo "COMMIT=$COMMIT" >> $GITHUB_ENV

          echo "🔁 Rolling back to: $TAG"
          echo "🔗 Commit: $COMMIT"

      # ----------------------------------------
      # Pull Image
      # ----------------------------------------
      - name: Pull Image
        run: docker pull $IMAGE

      # ----------------------------------------
      # Deploy
      # ----------------------------------------
      - name: Deploy
        run: |
          curl -X POST "https://backboard.railway.app/project/${{ secrets.RAILWAY_ENVIRONMENT_ID_STAGING }}/service/${{ secrets.RAILWAY_SERVICE_ID_STAGING }}/deploy" \
          -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN_STAGING }}"

      # ----------------------------------------
      # Wait
      # ----------------------------------------
      - name: Wait
        run: sleep 30

      # ----------------------------------------
      # Health Check
      # ----------------------------------------
      - name: Health Check
        run: |
          RESPONSE=$(curl -s $URL)
          echo "RESPONSE=$RESPONSE" >> $GITHUB_ENV

      # ----------------------------------------
      # Email Success
      # ----------------------------------------
      - name: Email Success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME_STAGING }}
          password: ${{ secrets.MAIL_PASSWORD_DEV }}
          subject: "🔁 ROLLBACK SUCCESS - ${{ env.TAG }}"
          to: ${{ secrets.MAIL_TO_STAGING }}
          cc: ${{ secrets.MAIL_CC_STAGING }}
          from: ${{ secrets.MAIL_USERNAME_STAGING }}
          body: |
            🔁 ROLLBACK COMPLETED SUCCESSFULLY

            Tag: ${{ env.TAG }}
            Commit: ${{ env.COMMIT }}
            Image: ${{ env.IMAGE }}

            URL:
            ${{ env.URL }}

            Response:
            ${{ env.RESPONSE }}

      # ----------------------------------------
      # Email Failure
      # ----------------------------------------
      - name: Email Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME_STAGING }}
          password: ${{ secrets.MAIL_PASSWORD_DEV }}
          subject: "❌ ROLLBACK FAILED - ${{ github.event.inputs.tag }}"
          to: ${{ secrets.MAIL_TO_STAGING }}
          cc: ${{ secrets.MAIL_CC_STAGING }}
          from: ${{ secrets.MAIL_USERNAME_STAGING }}
          body: |
            ❌ ROLLBACK FAILED

            Tag: ${{ github.event.inputs.tag }}

            Please check GitHub Actions logs for details.

      # ----------------------------------------
      # Done
      # ----------------------------------------
      - name: Done
        run: echo "Rollback completed"
