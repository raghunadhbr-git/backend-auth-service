name: 🗑️ DockerHub Selective Cleanup

on:
  workflow_dispatch:
    inputs:
      repos_to_delete:
        description: "Comma-separated DockerHub repositories to delete (example: repo1,repo2)"
        required: true

jobs:
  delete_repos:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: 🔑 Authenticate to DockerHub
        run: |
          TOKEN=$(curl -s -X POST https://hub.docker.com/v2/users/login/ \
            -H "Content-Type: application/json" \
            -d '{"username": "${{ secrets.DOCKERHUB_USERNAME }}", "password": "${{ secrets.DOCKERHUB_TOKEN }}"}' | jq -r .token)
          if [ -z "$TOKEN" ] || [ "$TOKEN" == "null" ]; then
            echo "❌ Failed to authenticate"
            exit 1
          fi
          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: 🗑️ Delete Selected Repositories
        run: |
          IFS=',' read -ra REPO_ARRAY <<< "${{ github.event.inputs.repos_to_delete }}"
          for repo in "${REPO_ARRAY[@]}"; do
            repo=$(echo $repo | xargs)  # trim spaces
            if [ -n "$repo" ]; then
              echo "Deleting $repo..."
              curl -s -X DELETE \
                -H "Authorization: JWT $TOKEN" \
                "https://hub.docker.com/v2/repositories/${{ secrets.DOCKERHUB_USERNAME }}/$repo/"
            fi
          done

      - name: ✅ Completed
        run: echo "Selected DockerHub repositories deleted successfully 🚀"
