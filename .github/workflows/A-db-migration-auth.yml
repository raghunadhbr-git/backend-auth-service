name: Auth DB Migration

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:

      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Set Flask app (change if needed)
      - name: Set Flask App
        run: echo "FLASK_APP=app" >> $GITHUB_ENV

      # Run migration with smart logging
      - name: Run DB Migration
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "===================================="
          echo "Starting database migration process"
          echo "===================================="

          echo ""
          echo "Current DB revision:"
          flask db current || echo "No migration history found"

          echo ""
          echo "Repository migration head(s):"
          flask db heads

          echo ""
          echo "Checking for pending migrations..."

          # Try normal migration
          if flask db upgrade; then
            echo ""
            echo "✔ Migration step completed"
          else
            echo ""
            echo "Migration failed (likely existing tables)."
            echo "Attempting recovery..."

            # Fix migration state
            flask db stamp head

            echo "Retrying migration..."
            flask db upgrade

            echo "✔ Recovery + migration completed"
          fi

          echo ""
          echo "Final DB revision:"
          flask db current

          echo ""
          echo "No pending migrations. Process finished."
